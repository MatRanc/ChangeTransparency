<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Transparency toggle: a cube whose back half is a dotted wireframe and
       whose front half is a solid face. Mid-gray so it reads on both the dark
       marking menu and a light toolbar (no theme-split needed). -->
  <g fill="none" stroke="#6f767f" stroke-width="1.4"
     stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1.3 1.7">
    <!-- back square -->
    <path d="M13 6 H26 V19 H13 Z"/>
    <!-- connectors front->back -->
    <path d="M5 14 L13 6"/>
    <path d="M18 14 L26 6"/>
    <path d="M18 27 L26 19"/>
    <path d="M5 27 L13 19"/>
  </g>
  <!-- solid front face -->
  <path d="M5 14 H18 V27 H5 Z" fill="#9aa1a9" fill-opacity="0.92"
        stroke="#5c636b" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
